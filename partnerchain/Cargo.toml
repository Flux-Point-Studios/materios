# JSON-RPC
jsonrpsee = { version = "0.24", features = ["server", "macros"] }

# Serde
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false }

# Local crates
pallet-orinq-receipts = { path = "pallets/orinq-receipts", default-features = false }
orinq-receipts-primitives = { path = "pallets/orinq-receipts/primitives", default-features = false }
orinq-receipts-rpc = { path = "pallets/orinq-receipts/rpc" }
materios-runtime = { path = "runtime" }

# MOTRA
sp-arithmetic = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2409-5", default-features = false }
pallet-motra = { path = "pallets/motra", default-features = false }
motra-primitives = { path = "pallets/motra/primitives", default-features = false }
motra-rpc = { path = "pallets/motra/rpc" }
# Getrandom: custom backend for wasm32-unknown-unknown (needed for Substrate WASM runtime)
getrandom = { version = "0.2", default-features = false, features = ["custom"] }

# Additional Substrate deps needed by IOG partner-chains pallets
sp-staking = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2409-5", default-features = false }
sp-weights = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2409-5", default-features = false }
sp-storage = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2409-5", default-features = false }
sp-consensus-slots = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2409-5", default-features = false }
pallet-session = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2409-5", default-features = false }
sp-crypto-hashing = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2409-5", default-features = false }
log = { version = "0.4.22", default-features = false }
derive-new = { version = "0.7.0" }
hex-literal = "0.4.1"

# IOG Partner Chains v1.5.1 pallets and primitives
pallet-sidechain = { git = "https://github.com/input-output-hk/partner-chains.git", tag = "v1.5.1", default-features = false }
