<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materios Explorer</title>
<link rel="stylesheet" href="static/style.css">
</head>
<body>

<nav class="nav-bar">

        <a href="#/">Materios Explorer</a>
        <span class="nav-chain-badge" id="nav-chain-badge">Staging</span>
    </div>
    <div class="nav-links">

        <a href="#/blocks" class="nav-link" data-route="/blocks">Blocks</a>

        <span class="footer-sep">|</span>

<script src="static/app.js"></script>
